name: Backend CI

# 1. When should this run? 
# We want it to run every time code is pushed to main, or a Pull Request is opened against main.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # 2. The Service Container
    # This spins up the exact same Postgres 15 database you use locally.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          # Notice we use the test database name that conftest.py expects!
          POSTGRES_DB: incident_logbook_test 
        ports:
          - 5432:5432
        # This health check forces GitHub to wait until Postgres is fully booted before starting the tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 3. The Steps (What the server actually types into the terminal)
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip" # This caches your downloads so future runs are lightning fast

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the main app dependencies
        pip install -r requirements.txt

    - name: Run Pytest
      # We run it via the python module just like you did locally
      run: |
        python -m pytest -v --tb=short